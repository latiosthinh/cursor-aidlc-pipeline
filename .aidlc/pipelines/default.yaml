name: "Full SDLC"
version: "1.0"
description: "Idea-to-report full software development lifecycle"

execution:
  mode: sequential
  defaultLoop: task

steps:
  - id: brainstorm
    name: "Brainstorm"
    agent: idea-expander
    model: composer-2
    gate: true
    maxRetries: 3
    artifact: idea.md
    tags: [product]
    skills: [brainstorming-frameworks]

  - id: requirements
    name: "Requirements"
    agent: requirements-engineer
    model: composer-2
    gate: true
    maxRetries: 3
    artifact: requirements.md
    tags: [product]
    skills: [requirements-specification]

  - id: design
    name: "Technical Design"
    agent: architect
    model: composer-2
    gate: true
    maxRetries: 3
    artifact: design.md
    tags: [technical]
    skills: [software-architecture]

  - id: tasks
    name: "Task Generation"
    agent: task-generator
    model: composer-2
    gate: true
    maxRetries: 3
    artifact: tasks.md
    tags: [technical]
    skills: [task-decomposition]

  - id: implementation
    name: "Implementation"
    agent: executor
    model: composer-2
    gate: false
    artifact: implementation.md
    tags: [code]
    skills: [react-best-practices, typescript-best-practices, cursor-sdk-patterns]

  - id: build-verify
    name: "Build & Test"
    agent: build-verifier
    model: composer-2
    gate: false
    maxRetries: 3
    artifact: build-report.md
    depends_on: [implementation]
    tags: [quality]

  - id: test-generation
    name: "Test Generation"
    agent: test-writer
    model: composer-2
    gate: true
    maxRetries: 3
    artifact: tests.md
    tags: [quality]
    skills: [testing-strategies]

  - id: report
    name: "Summary Report"
    agent: reporter
    model: composer-2
    gate: false
    maxRetries: 2
    artifact: report.md
    tags: [documentation]

loop_groups:
  - name: "Build Loop"
    steps: [implementation, build-verify]
    maxIterations: 3
    exitOn: all_pass
